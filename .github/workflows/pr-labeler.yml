# Workflow to assign appropriate labels to PRs
name: pr-labeler
on:
  pull_request_target:
  schedule:
    - cron: "35 4 * * 1-5"
      timezone: "Europe/Berlin"

jobs:
  pr-labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write # permission to create labels if not exist
    runs-on: ubuntu-latest
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-pr-labeler@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2

  handlefailure:
    needs:
      - pr-labeler
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify Webex
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"markdown" : "${{ github.server_url }}/${{ github.repository }} ${{ github.workflow }} failed"}' \
            "https://webexapis.com/v1/webhooks/incoming/${{ secrets.WEBEX_TOKEN }}"
