# Workflow for scanning GitHub workflows with actionlint
name: actionlint

on:
  pull_request:
  schedule:
    - cron: "5 4 * * 1-5"
      timezone: "Europe/Berlin"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-actionlint@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2

  handlefailure:
    needs:
      - actionlint
    runs-on: ubuntu-latest
    if: failure() && (github.event_name == 'schedule' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    steps:
      - name: Notify Webex
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"markdown" : "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ${{ github.workflow }} failed"}' \
            "https://webexapis.com/v1/webhooks/incoming/${{ secrets.WEBEX_TOKEN }}"
