# Workflow to check health of dockercompose based development stacks
name: dockercompose-healthcheck

on:
  pull_request:
  schedule:
    - cron: "30 4 * * 1-5"
      timezone: "Europe/Berlin"

jobs:
  dockercompose-healthcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-dockercompose-healthcheck@798bbf171750a308ece31e0ee7257b766888ccdc # v1.2.2
        with:
          skip-exited: true # required for keycloakmigration init container
          compose-file-path: "./stack/"

  handlefailure:
    needs:
      - dockercompose-healthcheck
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify Webex
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"markdown" : "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ${{ github.workflow }} failed"}' \
            "https://webexapis.com/v1/webhooks/incoming/${{ secrets.WEBEX_TOKEN }}"
