# Workflow to release Maven-based artifacts
name: release-maven

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Version to use when preparing a release (e.g., 1.2.3)"
        required: true
        default: 0.0.1
      developmentVersion:
        description: "Version to use for new local working copy (e.g., 1.2.4-SNAPSHOT)"
        required: true
        default: 0.0.2-SNAPSHOT
      app-path:
        type: choice
        description: Service-Name
        required: true
        options: # Add or modify paths according to your project structure
          - backend
          - eai
  schedule:
    - cron: "40 4 * * 1-5"
      timezone: "Europe/Berlin"

env:
  DEFAULT_RELEASE_VERSION: "0.0.1"
DEFAULT_RELEASE_VERSION: "0.0.3"
DEFAULT_DEVELOPMENT_VERSION: "0.0.4-SNAPSHOT"
  DEFAULT_APP_PATH: "backend"

jobs:
  release-maven-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # can be removed if use-pr is 'false'
    outputs:
      MVN_ARTIFACT_ID: ${{ steps.release-maven-artifact.outputs.MVN_ARTIFACT_ID }}
      ARTIFACT_NAME: ${{ steps.release-maven-artifact.outputs.artifact-name }}
    env:
      TZ: Europe/Berlin
    steps:
      - id: release-maven-artifact
        uses: it-at-m/lhm_actions/action-templates/actions/action-maven-release@4ed8f906bab8111fbd9a7af8e3f4129f9b721757 # v1.2.3
        with:
          app-path: ${{ github.event.inputs.app-path || env.DEFAULT_APP_PATH }}
          releaseVersion: ${{ github.event.inputs.releaseVersion || env.DEFAULT_RELEASE_VERSION }}
          developmentVersion: ${{ github.event.inputs.developmentVersion || env.DEFAULT_DEVELOPMENT_VERSION }}
          use-pr: "true"
          # the following variables are necessary to publish the packages to maven central
          # docs: https://it-at-m.github.io/lhm_actions/workflows.html#maven-central
          # SIGN_KEY_PASS: ${{ secrets.gpg_passphrase }}
          # CENTRAL_USERNAME: ${{ secrets.sonatype_username }}
          # CENTRAL_PASSWORD: ${{ secrets.sonatype_password }}
          # GPG_PRIVATE_KEY: ${{ secrets.gpg_private_key }}

  release-maven-image:
    runs-on: ubuntu-latest
    needs: release-maven-artifact
    permissions:
      packages: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-build-image@4ed8f906bab8111fbd9a7af8e3f4129f9b721757 # v1.2.3
        with:
          path: ${{ github.event.inputs.app-path || env.DEFAULT_APP_PATH }}
          image-name: ${{ github.event.inputs.app-path || env.DEFAULT_APP_PATH }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: ${{ needs.release-maven-artifact.outputs.ARTIFACT_NAME }}
          registry-username: ${{ github.actor }}
          image-tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.releaseVersion || env.DEFAULT_RELEASE_VERSION }}
            type=raw,value=latest

  release-maven-github:
    needs: release-maven-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-create-github-release@4ed8f906bab8111fbd9a7af8e3f4129f9b721757 # v1.2.3
        with:
          artifact-name: ${{ needs.release-maven-artifact.outputs.ARTIFACT_NAME }}
          tag-name: ${{ inputs.app-path || env.DEFAULT_APP_PATH }}-${{ github.event.inputs.releaseVersion || env.DEFAULT_RELEASE_VERSION }}
          generate-release-notes: true
          artifact-path: ${{ github.event.inputs.app-path || env.DEFAULT_APP_PATH }}/target/*.jar

  handlefailure:
    needs:
      - release-maven-artifact
      - release-maven-image
      - release-maven-github
    runs-on: ubuntu-latest
    permissions: {}
    if: failure() && (github.event_name == 'schedule' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    steps:
      - name: Notify Webex
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"markdown" : "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ${{ github.workflow }} failed"}' \
            "https://webexapis.com/v1/webhooks/incoming/${{ secrets.WEBEX_TOKEN }}"
